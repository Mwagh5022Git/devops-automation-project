apiVersion: apps/v1

kind: Deployment

metadata:
  name: devops-app

spec:

  replicas: 3

  selector:
    matchLabels:
      app: devops

  template:

    metadata:
      labels:
        app: devops

    spec:

      containers:

      - name: devops

        image: repo/devops-app

        ports:

        - containerPort: 80
