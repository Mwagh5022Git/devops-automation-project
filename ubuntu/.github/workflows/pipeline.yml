name: DevOps CI/CD Pipeline

on:

 push:

   branches:

     - main

jobs:

 build:

   runs-on: ubuntu-latest

   steps:

   - name: checkout

     uses: actions/checkout@v3

   - name: docker build

     run: docker build -t devops-app ./app

   - name: terraform deploy

     run: |

       cd terraform

       terraform init

       terraform apply -auto-approve
